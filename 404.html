<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagina non trovata — A Effe Wiring and Service</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="favicon.ico">
<style>
  :root{
    --bg:#0a0a0a; --bg-panel:#141414; --line:#2b2b2b;
    --ink:#f5f5f4; --ink-dim:#8c8c88; --accent:#ffffff; --radius:4px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
  }
  .logo-img{height:70px; border-radius:4px; margin-bottom:44px;}
  .code{
    font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',Consolas,monospace;
    font-size:13px; color:var(--ink-dim); letter-spacing:0.14em; text-transform:uppercase;
    margin-bottom:18px; display:flex; align-items:center; gap:12px;
  }
  .code::before,.code::after{content:""; width:32px; height:1px; background:var(--line);}
  h1{font-size:clamp(28px,4vw,42px); font-weight:600; margin-bottom:16px;}
  p{color:var(--ink-dim); font-size:16px; max-width:44ch; margin-bottom:36px; line-height:1.6;}
  .btn{
    font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',Consolas,monospace; font-size:13px;
    padding:13px 28px; border-radius:var(--radius); text-decoration:none; background:var(--accent);
    color:#0a0a0a; font-weight:600; display:inline-block;
  }
  .btn:hover{background:#c9c9c4;}
</style>
</head>
<body>
  <img src="logo.jpg" alt="A Effe Wiring and Service" class="logo-img">
  <div class="code">Errore 404</div>
  <h1>Pagina non trovata</h1>
  <p>Il collegamento che hai seguito non esiste più, o l'indirizzo è stato digitato in modo errato.</p>
  <a class="btn" href="index.html">← Torna alla home</a>
</body>
</html>
